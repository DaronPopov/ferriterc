# libtorch_cuda.so from the PyTorch wheel links against NCCL, cuSPARSELt, and
# NVSHMEM for multi-GPU / sparse ops.  These are not present on single-GPU
# Jetson boards, and we don't call into them — tell the linker to ignore
# unresolved symbols in shared libraries rather than failing the build.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "link-args=-Wl,--allow-shlib-undefined"]
