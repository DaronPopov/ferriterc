[package]
name = "ferrite-runtime-src"
version = "0.2.0"
kind = "source-distribution"

[profiles]
default = "full"

[profile.runtime]
components = [
  "ferrite-os",
  "ferrite-gpu-lang",
  "external/aten-ptx",
  "external/cudarc-ptx",
  "external/ferrite-torch",
  "external/ferrite-xla",
]

[profile.full]
components = [
  "ferrite-os",
  "ferrite-gpu-lang",
  "external/aten-ptx",
  "external/cudarc-ptx",
  "external/ferrite-torch",
  "external/ferrite-xla",
  "ferrite-os/workloads/finetune_engine",
  "ferrite-os/workloads/mathematics_engine",
]
