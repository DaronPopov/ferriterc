# Ferrite Connectors — Example Configuration

queue_capacity = 4096
shutdown_drain_timeout_ms = 5000

[[sources]]
type = "rest"
name = "coindesk-btc"
url = "https://api.coindesk.com/v1/bpi/currentprice.json"
interval_ms = 10000
max_retries = 3
# jq_path = "/bpi/USD"    # optional JSON pointer for payload extraction
# headers = { "Authorization" = "Bearer TOKEN" }

# [[sources]]
# type = "ws"
# name = "binance-ticker"
# url = "wss://stream.binance.com:9443/ws/btcusdt@trade"
# reconnect_ms = 3000
# max_retries = 5

[sink]
# socket_path = "/tmp/ferrite-os-1000/daemon.sock"  # auto-discovered if omitted
command_template = "ping"
output_file = "/tmp/ferrite-connectors-output.jsonl"
batch_size = 10
flush_interval_ms = 1000
ipc_enabled = true
