[package]
name = "ferrite-xla"
version = "0.1.0"
edition = "2021"
authors = ["Daron Popov"]
description = "XLA (JAX/TensorFlow backend) integration with PTX-OS TLSF allocator"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]  # cdylib for Python, rlib for Rust examples

[dependencies]
# PTX-OS Runtime
ptx-runtime = { path = "../../ferrite-os/ptx-runtime" }
ptx-sys = { path = "../../ferrite-os/internal/ptx-sys" }

# Utilities
anyhow = "1.0"
libc = "0.2"

[build-dependencies]
cc = "1.0"

[[example]]
name = "xla_allocator_test"
