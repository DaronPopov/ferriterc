[build]
rustflags = [
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../../ferrite-os/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../ferrite-os/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../../external/libtorch/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../external/libtorch/lib",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../../ferrite-os/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../ferrite-os/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../../external/libtorch/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../external/libtorch/lib",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../../ferrite-os/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../ferrite-os/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../../external/libtorch/lib",
  "-C", "link-arg=-Wl,-rpath,$ORIGIN/../../../external/libtorch/lib",
  # PyTorch wheel's libtorch_cuda.so links NCCL/cuSPARSELt/NVSHMEM which
  # are absent on single-GPU Jetson — allow their symbols to stay unresolved.
  "-C", "link-args=-Wl,--allow-shlib-undefined",
]

[env]
LD_LIBRARY_PATH = { value = "../ferrite-os/lib:../external/libtorch/lib:${LD_LIBRARY_PATH}", force = false, relative = true }
LIBTORCH = { value = "../external/libtorch", force = false, relative = true }
